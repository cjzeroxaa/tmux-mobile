name = "tmux-mobile"
main = "worker/index.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "34431cd51da281ed3590ab6ce5141d09"

# Serve the existing frontend from public/. run_worker_first lets the Worker
# handle every request (so /api and /agent/connect reach it, and "/" can get the
# title injected) and fall back to env.ASSETS for static files.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# The hub broker: one Durable Object holds agent WebSockets (hibernation) and
# brokers browser requests to them.
[[durable_objects.bindings]]
name = "HUB"
class_name = "Hub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Hub"]
