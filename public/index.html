<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="application-name" content="__APP_TITLE__" />
    <meta name="apple-mobile-web-app-title" content="__APP_TITLE__" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>__APP_TITLE__</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="mobile-topbar">
        <button id="openTargetPicker" class="target-pill" type="button">
          <span>Attached window</span>
          <strong id="mobileTargetLabel">No window selected</strong>
        </button>
        <div id="voiceStatus" class="voice-status topbar-status" role="status" aria-live="polite">Ready</div>
        <button id="retryVoice" class="small-button retry" type="button" hidden>Retry</button>
        <button id="mobileRefresh" class="icon-button" type="button" title="Refresh" aria-label="Refresh">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        </button>
      </header>

      <section class="snapshot-panel">
        <div class="toolbar">
          <label class="line-picker">
            <span>Lines</span>
            <select id="lineCount">
              <option value="50">50</option>
              <option value="120" selected>120</option>
              <option value="250">250</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </label>
          <button id="refreshSnapshot" class="small-button">Refresh</button>
          <label class="toggle">
            <input id="autoRefresh" type="checkbox" checked />
            <span>Auto</span>
          </label>
          <button id="fullscreenRead" class="small-button fullscreen-only" type="button" aria-label="Read current window">Read</button>
          <button id="fullscreenSnapshot" class="small-button" type="button" aria-pressed="false" aria-label="Fullscreen">
            <svg class="icon-idle" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/></svg>
            <svg class="icon-busy" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/></svg>
          </button>
        </div>
        <pre id="snapshot" class="snapshot">Select a window.</pre>
        <input id="paneInput" class="pane-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Pane keyboard input" tabindex="-1" />
      </section>

      <section class="control-panel">
        <div id="chat" class="chat" hidden></div>

        <div id="voiceComposer" class="voice-composer">
          <div class="voice-actions">
            <div id="voiceEntry" class="voice-entry">
              <button id="voiceButton" class="voice-button" type="button" title="Record voice" aria-label="Record voice">
                <span class="mic-icon" aria-hidden="true"></span>
                <span id="voiceTitle" class="sr-only">Record voice</span>
                <small id="voiceSubtitle" class="sr-only">Tap to record a voice command</small>
              </button>
              <button id="speakWindow" type="button" class="read-button" title="Read current window" aria-label="Read current window">
                <svg class="icon-idle" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                <svg class="icon-busy" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="5" y="5" rx="2"/></svg>
              </button>
              <button id="keyboardButton" class="keyboard-button" type="button" title="Text input" aria-label="Text input">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg>
              </button>
            </div>
            <form id="textComposer" class="text-composer" hidden>
              <textarea id="textInput" rows="4" autocomplete="off" autocapitalize="sentences" spellcheck="true" placeholder="Paste text"></textarea>
              <div class="text-composer-actions">
                <button id="submitText" class="small-button submit" type="submit">Submit</button>
                <button id="cancelText" class="small-button cancel" type="button">Voice</button>
              </div>
            </form>
            <div id="voiceRecordingActions" class="voice-recording-actions" hidden>
              <div id="voiceWaveform" class="voice-waveform" aria-hidden="true"></div>
              <button id="cancelVoice" class="small-button cancel" type="button">Cancel</button>
              <button id="submitVoice" class="small-button submit" type="button">Stop</button>
            </div>
            <div class="quick-action-grid" aria-label="Pane actions">
              <button type="button" data-key="Enter" class="action-button quick-action" title="Enter" aria-label="Enter">Ent</button>
              <button type="button" data-key="q" class="action-button quick-action" title="q" aria-label="q">Q</button>
              <button type="button" data-key="Escape" class="action-button quick-action" title="Escape" aria-label="Escape">Esc</button>
              <button type="button" data-key="C-c" class="action-button quick-action danger" title="Control-C" aria-label="Control-C">^C</button>
              <button type="button" data-key="BSpace" class="action-button quick-action" title="Delete" aria-label="Delete">Del</button>
              <button type="button" data-command="claude" class="action-button quick-action command" title="Claude" aria-label="Run Claude">Cl</button>
              <button type="button" data-command="codex" class="action-button quick-action command" title="Codex" aria-label="Run Codex">Cx</button>
              <button type="button" data-key="Tab" class="action-button quick-action" title="Tab" aria-label="Tab">Tab</button>
              <button type="button" data-send-text="/goal " data-send-enter="false" class="action-button quick-action agent" title="Insert /goal" aria-label="Insert slash goal">Goal</button>
              <button type="button" data-send-text="/clear" data-send-enter="true" class="action-button quick-action agent" title="Run /clear" aria-label="Run slash clear">Clear</button>
            </div>
            <section id="directoryNavigator" class="directory-navigator" aria-label="Current directory">
              <div class="directory-header">
                <span>Dir</span>
                <strong id="directoryPath">No window selected</strong>
              </div>
              <div id="directoryList" class="directory-list"></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <div id="targetSheet" class="target-sheet" hidden>
      <button id="targetBackdrop" class="target-backdrop" type="button" aria-label="Close target picker"></button>
      <section class="target-panel" role="dialog" aria-modal="true" aria-labelledby="targetSheetTitle">
        <div class="target-panel-header">
          <div>
            <h2 id="targetSheetTitle">Switch Target</h2>
            <p class="muted">Select a session, then choose a window.</p>
          </div>
          <button id="closeTargetPicker" class="icon-button" type="button" title="Close">X</button>
        </div>

        <div class="target-panel-actions">
          <button id="mobileRefreshTree" class="small-button" type="button">Refresh</button>
          <span id="mobileConnectionStatus" class="muted">localhost</span>
        </div>

        <label class="target-select">
          <span>Session</span>
          <select id="mobileSessionSelect"></select>
        </label>

        <div class="session-management" aria-label="Session management">
          <label class="session-name-field">
            <span>Name</span>
            <input id="sessionNameInput" type="text" autocomplete="off" placeholder="session name" />
          </label>
          <div class="session-actions">
            <button id="createSession" class="small-button" type="button">New</button>
            <button id="renameSession" class="small-button" type="button">Rename</button>
          </div>
        </div>

        <div class="mobile-target-groups">
          <section class="target-group">
            <div class="target-group-header">
              <h3>Windows</h3>
              <div class="window-actions" aria-label="Window actions">
                <button id="newWindow" class="small-button" type="button">+ Win</button>
                <button id="killWindow" class="small-button danger" type="button">Kill</button>
              </div>
            </div>
            <div id="mobileWindows" class="list mobile-list"></div>
          </section>
        </div>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
