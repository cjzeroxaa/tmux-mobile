<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="application-name" content="__APP_TITLE__" />
    <meta name="apple-mobile-web-app-title" content="__APP_TITLE__" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>__APP_TITLE__</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="mobile-topbar">
        <button id="openTargetPicker" class="target-pill" type="button">
          <span>Attached window</span>
          <strong id="mobileTargetLabel">No window selected</strong>
        </button>
        <button id="mobileRefresh" class="icon-button" title="Refresh">R</button>
      </header>

      <section class="snapshot-panel">
        <div class="toolbar">
          <div class="segmented" role="tablist" aria-label="Capture mode">
            <button data-mode="screen">Screen</button>
            <button data-mode="tail" class="active">Tail</button>
            <button data-mode="full">Full</button>
          </div>
          <label class="line-picker">
            <span>Lines</span>
            <select id="lineCount">
              <option value="50">50</option>
              <option value="120" selected>120</option>
              <option value="250">250</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </label>
          <button id="refreshSnapshot" class="small-button">Refresh</button>
          <label class="toggle">
            <input id="autoRefresh" type="checkbox" checked />
            <span>Auto</span>
          </label>
          <button id="fullscreenSnapshot" class="small-button" type="button" aria-pressed="false">FS</button>
        </div>
        <pre id="snapshot" class="snapshot">Select a window.</pre>
      </section>

      <section class="control-panel">
        <div id="chat" class="chat" hidden></div>

        <div id="voiceComposer" class="voice-composer">
          <div class="voice-actions">
            <button id="voiceButton" class="voice-button" type="button">
              <span id="voiceTitle">Start Recording</span>
              <small id="voiceSubtitle">Tap to record a voice command</small>
            </button>
            <div id="voiceRecordingActions" class="voice-recording-actions" hidden>
              <div id="voiceWaveform" class="voice-waveform" aria-hidden="true"></div>
              <button id="cancelVoice" class="small-button cancel" type="button">Cancel</button>
              <button id="submitVoice" class="small-button submit" type="button">Submit</button>
            </div>
            <div class="quick-action-grid" aria-label="Pane actions">
              <button type="button" data-key="Enter" class="action-button quick-action" title="Enter" aria-label="Enter">Ent</button>
              <button type="button" data-key="q" class="action-button quick-action" title="q" aria-label="q">Q</button>
              <button type="button" data-key="Escape" class="action-button quick-action" title="Escape" aria-label="Escape">Esc</button>
              <button type="button" data-key="C-c" class="action-button quick-action danger" title="Control-C" aria-label="Control-C">^C</button>
              <button type="button" data-command="claude" class="action-button quick-action command" title="Claude" aria-label="Run Claude">Cl</button>
              <button type="button" data-command="codex" class="action-button quick-action command" title="Codex" aria-label="Run Codex">Cx</button>
              <button type="button" data-command="agr" class="action-button quick-action command" title="AGR" aria-label="Run AGR">Ag</button>
              <button id="speakWindow" type="button" class="action-button quick-action audio" title="Read current window" aria-label="Read current window">Read</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="targetSheet" class="target-sheet" hidden>
      <button id="targetBackdrop" class="target-backdrop" type="button" aria-label="Close target picker"></button>
      <section class="target-panel" role="dialog" aria-modal="true" aria-labelledby="targetSheetTitle">
        <div class="target-panel-header">
          <div>
            <h2 id="targetSheetTitle">Switch Target</h2>
            <p class="muted">Select a session, then choose a window.</p>
          </div>
          <button id="closeTargetPicker" class="icon-button" type="button" title="Close">X</button>
        </div>

        <div class="target-panel-actions">
          <button id="mobileRefreshTree" class="small-button" type="button">Refresh</button>
          <span id="mobileConnectionStatus" class="muted">localhost</span>
        </div>

        <label class="target-select">
          <span>Session</span>
          <select id="mobileSessionSelect"></select>
        </label>

        <div class="session-management" aria-label="Session management">
          <label class="session-name-field">
            <span>Name</span>
            <input id="sessionNameInput" type="text" autocomplete="off" placeholder="session name" />
          </label>
          <div class="session-actions">
            <button id="createSession" class="small-button" type="button">New</button>
            <button id="renameSession" class="small-button" type="button">Rename</button>
          </div>
        </div>

        <div class="mobile-target-groups">
          <section class="target-group">
            <div class="target-group-header">
              <h3>Windows</h3>
              <div class="window-actions" aria-label="Window actions">
                <button id="newWindow" class="small-button" type="button">+ Win</button>
                <button id="killWindow" class="small-button danger" type="button">Kill</button>
              </div>
            </div>
            <div id="mobileWindows" class="list mobile-list"></div>
          </section>
        </div>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
