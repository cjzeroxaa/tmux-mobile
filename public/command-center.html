<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Command Center · __APP_TITLE__</title>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("tmux-mobile-theme") || "{}").theme;
        document.documentElement.dataset.theme = t === "dark" ? "" : "kami";
      } catch (e) {
        document.documentElement.dataset.theme = "kami";
      }
    </script>
    <!-- Reuse the main app's stylesheet for theme tokens (colors / fonts /
         text-input chrome) and then layer the Command Center's own layout
         rules on top. Keeps the two views visually consistent without
         coupling their structure. -->
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/command-center.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  </head>
  <body class="command-center-body">
    <main class="cc-shell">
      <header class="cc-topbar">
        <div class="cc-title-block">
          <h1 class="cc-title">Command Center</h1>
          <span id="ccStatus" class="cc-status" aria-live="polite">Loading…</span>
        </div>
        <button id="ccRefresh" class="cc-icon-button" type="button" title="Refresh" aria-label="Refresh agents">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        </button>
        <a id="ccBackToApp" class="cc-link" href="/app">Main app →</a>
      </header>

      <!-- Filter + sort controls. Machine and status chips are populated
           by command-center.js once the first payload lands; sort is a
           plain native <select> so the iOS picker UX comes for free. -->
      <section class="cc-controls">
        <div id="ccFilterRow" class="cc-filter-row" role="toolbar" aria-label="Filter agents"></div>
        <label class="cc-sort">
          <span>Sort</span>
          <select id="ccSort" class="cc-sort-select">
            <option value="status">Working first</option>
            <option value="machine">By machine</option>
            <option value="recent">Recent activity</option>
            <option value="name">Window name</option>
          </select>
        </label>
      </section>

      <section id="ccList" class="cc-list" aria-label="Active agent sessions"></section>
    </main>

    <script src="/command-center.js" type="module"></script>
  </body>
</html>
